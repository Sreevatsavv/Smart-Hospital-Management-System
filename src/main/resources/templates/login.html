<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Login - Smart Hospital Management System</title>

<link rel="stylesheet" th:href="@{/css/login.css}">

</head>

<body>

<div class="login-box">

    <h1>🏥 Smart Hospital</h1>

    <h3>Login</h3>

	<form th:action="@{/login}" method="post">

	    <p style="color:red;" th:text="${message}"></p>

	    <input type="email"
	           name="email"
	           placeholder="Email"
	           required>

	    <input type="password"
	           name="password"
	           placeholder="Password"
	           required>

	    <button type="submit">
	        Login
	    </button>

	</form>

    <p>
        Don't have an account?
        <a href="#">Register</a>
    </p>

</div>

</body>
</html>
