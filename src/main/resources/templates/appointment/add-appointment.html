<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>MediSync | Book Appointment</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/appointment.css}">

</head>

<body>

<div class="container">

    <div class="page-header">

        <h1>📅 Book Appointment</h1>

        <a class="back-btn" th:href="@{/patient}">
            ← Dashboard
        </a>

    </div>

    <div class="form-card">

        <form th:action="@{/appointment/save}"
              th:object="${appointment}"
              method="post">

            <label>Select Doctor</label>

            <select name="doctorId" required>

                <option value="">Choose Doctor</option>

                <option
                        th:each="doctor : ${doctors}"
                        th:value="${doctor.id}"
                        th:text="${doctor.name}">
                </option>

            </select>

            <label>Patient</label>

            <input type="text"
                   th:value="${patient.name}"
                   readonly>

            <input type="hidden"
                   name="patientId"
                   th:value="${patient.id}">

            <label>Date</label>

            <input type="date"
                   th:field="*{appointmentDate}"
                   required>

            <label>Time</label>

            <input type="time"
                   th:field="*{appointmentTime}"
                   required>

            <label>Reason</label>

            <textarea
                    th:field="*{reason}"
                    placeholder="Describe your health concern...">
            </textarea>

            <button type="submit">
                📅 Book Appointment
            </button>

        </form>

    </div>

</div>

</body>

</html>
