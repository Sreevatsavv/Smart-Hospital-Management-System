<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>MediSync | Prescription</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/prescription.css}">

</head>

<body>

<div class="container">

    <div class="page-header">

        <h1>💊 Write Prescription</h1>

        <a class="dashboard-btn"
           th:href="@{/doctor}">
            ← Dashboard
        </a>

    </div>

    <div class="patient-card">

        <div class="info-grid">

            <div class="info-item">
                <h4>👤 Patient</h4>
                <p th:text="${appointment.patient.name}"></p>
            </div>

            <div class="info-item">
                <h4>🩺 Doctor</h4>
                <p th:text="${appointment.doctor.name}"></p>
            </div>

            <div class="info-item">
                <h4>📅 Date</h4>
                <p th:text="${appointment.appointmentDate}"></p>
            </div>

            <div class="info-item">
                <h4>🕒 Time</h4>
                <p th:text="${appointment.appointmentTime}"></p>
            </div>

        </div>

    </div>

    <div class="form-card">

        <form th:action="@{/prescription/send}"
              th:object="${prescription}"
              method="post">

            <input type="hidden"
                   name="appointmentId"
                   th:value="${appointment.id}"/>

            <label>Diagnosis</label>

            <textarea
                    th:field="*{diagnosis}"
                    rows="3"
                    placeholder="Enter diagnosis...">
            </textarea>

            <label>Medicines</label>

            <textarea
                    th:field="*{medicines}"
                    rows="7"
                    placeholder="Enter medicines with dosage...">
            </textarea>

            <label>Notes / Instructions</label>

            <textarea
                    th:field="*{notes}"
                    rows="4"
                    placeholder="Additional instructions...">
            </textarea>

            <button type="submit">

                📧 Send Prescription

            </button>

        </form>

    </div>

</div>

</body>

</html>
