<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Doctor Management</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
<link rel="stylesheet" th:href="@{/css/doctor.css}">

</head>

<body>

<div class="container">

<div class="top-bar">

<h2>Doctor Management</h2>

<div>

<a class="btn" th:href="@{/}">
🏠 Dashboard
</a>

<a class="btn" th:href="@{/doctor/add}">
+ Add Doctor
</a>

</div>

</div>

<table>

<tr>

<th>ID</th>
<th>Name</th>
<th>Specialization</th>
<th>Qualification</th>
<th>Experience</th>
<th>Phone</th>
<th>Email</th>
<th>Actions</th>

</tr>

<tr th:each="doctor : ${doctors}">

<td th:text="${doctor.id}"></td>
<td th:text="${doctor.name}"></td>
<td th:text="${doctor.specialization}"></td>
<td th:text="${doctor.qualification}"></td>
<td th:text="${doctor.experience}"></td>
<td th:text="${doctor.phone}"></td>
<td th:text="${doctor.email}"></td>

<td>

<a class="edit"
th:href="@{/doctor/edit/{id}(id=${doctor.id})}">
Edit
</a>

<a class="delete"
th:href="@{/doctor/delete/{id}(id=${doctor.id})}"
onclick="return confirm('Delete this doctor?')">
Delete
</a>

</td>

</tr>

</table>

</div>

</body>

</html>
